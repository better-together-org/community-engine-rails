bel-container"/><g transform="translate(-100, -204)" style="color:#1f3c1a !important" class="label"><rect/><foreignObject height="408" width="200"><div xmlns="http://www.w3.org/1999/xhtml" style="color: rgb(31, 60, 26) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel" style="color:#1f3c1a !important"><p>This reuses the same policy(owner).update? gate that<br />portal_billable_owner already applied to billing-portal access,<br />extending it to the sponsor-candidate list and the checkout<br />billable_owner resolver. A person can no longer see or select<br />a community they don't steward as a billing payer just<br />because it happened to be policy-visible to them.</p></span></div></foreignObject></g></g></g></g><g transform="translate(198, 731.2999992370605)" id="flowchart-Steward-0" class="node default record"><rect height="102" width="260" y="-51" x="-130" style="fill:#f6f3ea !important;stroke:#6f5b3e !important;stroke-width:1px !important" class="basic label-container"/><g transform="translate(-100, -36)" style="color:#23180d !important" class="label"><rect/><foreignObject height="72" width="200"><div xmlns="http://www.w3.org/1999/xhtml" style="color: rgb(35, 24, 13) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel" style="color:#23180d !important"><p>Community steward<br />viewing a community's billing page</p></span></div></foreignObject></g></g><g transform="translate(765.21875, 702)" id="flowchart-AllVisible-1" class="node default risk"><rect height="222" width="260" y="-111" x="-130" style="fill:#fbeaea !important;stroke:#8a3a3a !important;stroke-width:1px !important" class="basic label-container"/><g transform="translate(-100, -96)" style="color:#4a1414 !important" class="label"><rect/><foreignObject height="192" width="200"><div xmlns="http://www.w3.org/1999/xhtml" style="color: rgb(74, 20, 20) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel" style="color:#4a1414 !important"><p>Every community visible under<br />CommunityPolicy::Scope<br />(public/member communities, plus every<br />private community if the viewer is a<br />platform manager)</p></span></div></foreignObject></g></g><g transform="translate(765.21875, 966)" id="flowchart-Stewarded-2" class="node default outcome"><rect height="126" width="260" y="-63" x="-130" style="fill:#edf7ec !important;stroke:#4f7b43 !important;stroke-width:1px !important" class="basic label-container"/><g transform="translate(-100, -48)" style="color:#1f3c1a !important" class="label"><rect/><foreignObject height="96" width="200"><div xmlns="http://www.w3.org/1999/xhtml" style="color: rgb(31, 60, 26) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel" style="color:#1f3c1a !important"><p>Only communities where<br />policy(candidate).update?<br />(the steward actually manages that community)</p></span></div></foreignObject></g></g><g transform="translate(1278.5625, 722.5)" id="flowchart-Buttons-3" class="node default record"><rect height="126" width="260" y="-63" x="-130" style="fill:#f6f3ea !important;stroke:#6f5b3e !important;stroke-width:1px !important" class="basic label-container"/><g transform="translate(-100, -48)" style="color:#23180d !important" class="label"><rect/><foreignObject height="96" width="200"><div xmlns="http://www.w3.org/1999/xhtml" style="color: rgb(35, 24, 13) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel" style="color:#23180d !important"><p>'Pay via ___ instead' buttons<br />and the checkout billable_owner resolver</p></span></div></foreignObject></g></g></g></g></g>