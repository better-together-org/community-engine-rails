---
openapi: 3.0.1
info:
  title: Community Engine API
  version: v1
  description: |
    Better Together Community Engine REST API

    ## Authentication

    Most endpoints require JWT authentication via Bearer token in the Authorization header.
    See the Authentication section for how to obtain tokens via sign-in.
paths:
  "/api/auth/sign-in":
    post:
      summary: Sign in to get JWT token
      tags:
      - Authentication
      description: Authenticate with email and password. Returns a JWT token in the
        response body.
      parameters: []
      responses:
        '200':
          description: signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      type:
                        type: string
                        example: sessions
                      id:
                        type: string
                        format: uuid
                      attributes:
                        type: object
                        properties:
                          email:
                            type: string
                          token:
                            type: string
                            description: JWT Bearer token
                          confirmed:
                            type: boolean
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                    password:
                      type: string
                      example: SecurePassword123!@#
                  required:
                  - email
                  - password
              required:
              - user
        required: true
  "/api/auth/sign-out":
    delete:
      summary: Sign out (revoke JWT token)
      tags:
      - Authentication
      security:
      - bearer_auth: []
      description: Sign out and invalidate the current JWT token.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        example: Bearer eyJhbGciOiJIUzI1NiJ9...
        schema:
          type: string
      responses:
        '200':
          description: signed out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  "/api/auth/sign-up":
    post:
      summary: Register a new user account
      tags:
      - Authentication
      description: Create a new user account. Sends a confirmation email.
      parameters: []
      responses:
        '201':
          description: user registered successfully
        '422':
          description: invalid registration data
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: newuser@example.com
                    password:
                      type: string
                      example: SecurePassword123!@#
                    password_confirmation:
                      type: string
                      example: SecurePassword123!@#
                    person_attributes:
                      type: object
                      properties:
                        name:
                          type: string
                          example: John Doe
                        identifier:
                          type: string
                          example: john-doe
                      required:
                      - name
                      - identifier
                  required:
                  - email
                  - password
                  - password_confirmation
                  - person_attributes
                privacy_policy_agreement:
                  type: string
                  example: '1'
                terms_of_service_agreement:
                  type: string
                  example: '1'
                code_of_conduct_agreement:
                  type: string
                  example: '1'
              required:
              - user
              - privacy_policy_agreement
              - terms_of_service_agreement
              - code_of_conduct_agreement
        required: true
  "/api/auth/password":
    post:
      summary: Request password reset email
      tags:
      - Authentication
      description: Send password reset instructions to the user email.
      parameters: []
      responses:
        '200':
          description: password reset email sent (or email not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                  required:
                  - email
              required:
              - user
        required: true
  "/api/auth/confirmation":
    post:
      summary: Resend confirmation email
      tags:
      - Authentication
      description: Resend email confirmation instructions.
      parameters: []
      responses:
        '200':
          description: confirmation email sent (or email not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                  required:
                  - email
              required:
              - user
        required: true
  "/api/v1/communities":
    get:
      summary: List communities
      tags:
      - Communities
      security:
      - bearer_auth: []
      description: List communities accessible to the current user. Authentication
        required.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        example: Bearer eyJhbGciOiJIUzI1NiJ9...
        schema:
          type: string
      - name: page[number]
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: page[size]
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      responses:
        '200':
          description: communities listed
        '401':
          description: unauthorized
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Create a community
      tags:
      - Communities
      security:
      - bearer_auth: []
      description: Create a new community. Requires create_community permission.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '201':
          description: community created
        '401':
          description: unauthorized
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: communities
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        privacy:
                          type: string
                          enum:
                          - public
                          - private
                          default: public
                      required:
                      - name
                  required:
                  - type
                  - attributes
              required:
              - data
        required: true
  "/api/v1/communities/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      description: Community UUID
      schema:
        type: string
    get:
      summary: Get a community
      tags:
      - Communities
      security:
      - bearer_auth: []
      description: Retrieve a community by ID.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: community found
        '404':
          description: not found
    patch:
      summary: Update a community
      tags:
      - Communities
      security:
      - bearer_auth: []
      description: Update a community. Requires manage_community permission.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '200':
          description: community updated
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: communities
                    id:
                      type: string
                      format: uuid
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                  required:
                  - type
                  - id
                  - attributes
              required:
              - data
        required: true
    delete:
      summary: Delete a community
      tags:
      - Communities
      security:
      - bearer_auth: []
      description: Delete a community. Requires delete_community permission. Protected
        communities cannot be deleted.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '204':
          description: community deleted
  "/api/v1/events":
    get:
      summary: List events
      tags:
      - Events
      security:
      - bearer_auth: []
      description: List events accessible to the authenticated user.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: events listed
        '401':
          description: unauthorized
    post:
      summary: Create an event
      tags:
      - Events
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: event created
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: events
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                        starts_at:
                          type: string
                          format: date-time
                        ends_at:
                          type: string
                          format: date-time
                        privacy:
                          type: string
                          enum:
                          - public
                          - private
                      required:
                      - name
                  required:
                  - type
                  - attributes
              required:
              - data
        required: true
  "/api/v1/events/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Get an event
      tags:
      - Events
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: event found
        '404':
          description: not found
    patch:
      summary: Update an event
      tags:
      - Events
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: event updated
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: events
                    id:
                      type: string
                      format: uuid
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                  required:
                  - type
                  - id
                  - attributes
              required:
              - data
        required: true
    delete:
      summary: Delete an event
      tags:
      - Events
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '204':
          description: event deleted
  "/api/v1/notifications":
    get:
      summary: List notifications
      tags:
      - Notifications
      security:
      - bearer_auth: []
      description: List the current user's notifications.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: notifications listed
  "/api/v1/notifications/mark_all_read":
    post:
      summary: Mark all notifications as read
      tags:
      - Notifications
      security:
      - bearer_auth: []
      description: Mark all unread notifications as read for the current user.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '204':
          description: all notifications marked read
  "/api/v1/invitations":
    get:
      summary: List invitations
      tags:
      - Invitations
      security:
      - bearer_auth: []
      description: List the current user's community invitations.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: invitations listed
    post:
      summary: Create an invitation
      tags:
      - Invitations
      security:
      - bearer_auth: []
      description: Invite someone to a community. Requires manage_community permission.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: invitation created
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: invitations
                    attributes:
                      type: object
                      properties:
                        invitee_email:
                          type: string
                          format: email
                          description: Email of person to invite
                        locale:
                          type: string
                          description: Preferred locale for the invitation
                          example: en
                      required:
                      - invitee_email
                  required:
                  - type
                  - attributes
              required:
              - data
        required: true
  "/api/v1/pages":
    get:
      summary: List pages
      tags:
      - Pages
      security:
      - bearer_auth: []
      description: List published pages.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: pages listed
  "/api/v1/pages/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Get a page
      tags:
      - Pages
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: page found
  "/api/v1/metrics/summary":
    get:
      summary: Get platform metrics summary
      tags:
      - Metrics
      security:
      - bearer_auth: []
      description: Get aggregated platform metrics. Requires manage_platform permission.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: metrics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      communities:
                        type: object
                      people:
                        type: object
                      events:
                        type: object
                      posts:
                        type: object
        '404':
          description: not authorized or not found
  "/api/oauth_applications":
    get:
      summary: List OAuth applications
      tags:
      - OAuth
      security:
      - bearer_auth: []
      description: List the current user's registered OAuth applications.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: applications listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        uid:
                          type: string
                        scopes:
                          type: string
        '401':
          description: unauthorized
    post:
      summary: Create an OAuth application
      tags:
      - OAuth
      security:
      - bearer_auth: []
      description: Register a new OAuth application for API access.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '201':
          description: application created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                oauth_application:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Application name
                    redirect_uri:
                      type: string
                      description: Redirect URI for OAuth flow
                    scopes:
                      type: string
                      description: Space-separated list of scopes
                      example: read write mcp_access
                  required:
                  - name
                  - redirect_uri
              required:
              - oauth_application
        required: true
  "/api/oauth_applications/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Get an OAuth application
      tags:
      - OAuth
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: application found
        '404':
          description: not found
    delete:
      summary: Delete an OAuth application
      tags:
      - OAuth
      security:
      - bearer_auth: []
      description: Delete an OAuth application. Only the owner can delete their app.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '204':
          description: application deleted
  "/api/oauth/token":
    post:
      summary: Request OAuth2 access token
      tags:
      - OAuth
      description: |
        Request an OAuth2 access token using client_credentials or authorization_code grant.

        **client_credentials grant** — for server-to-server API access:
        ```
        grant_type=client_credentials&client_id=...&client_secret=...&scope=read+write
        ```

        **authorization_code grant** — for user-delegated access:
        ```
        grant_type=authorization_code&code=...&redirect_uri=...&client_id=...&client_secret=...
        ```
      parameters: []
      responses:
        '200':
          description: access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 7200
                  scope:
                    type: string
        '401':
          description: invalid client credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
        required: true
        description: OAuth2 grant type
  "/api/oauth/revoke":
    post:
      summary: Revoke an OAuth2 token
      tags:
      - OAuth
      description: Revoke an access token or refresh token.
      parameters: []
      responses:
        '200':
          description: token revoked (or already invalid)
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
        required: true
        description: Token to revoke
  "/api/v1/people/me":
    get:
      summary: Get current user profile
      tags:
      - People
      security:
      - bearer_auth: []
      description: Retrieve the authenticated user's person profile.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: current person retrieved
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      type:
                        type: string
                        example: people
                      id:
                        type: string
                        format: uuid
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                          identifier:
                            type: string
                          email:
                            type: string
                            format: email
        '401':
          description: unauthorized
  "/api/v1/people":
    get:
      summary: List people
      tags:
      - People
      security:
      - bearer_auth: []
      description: List people. Returns public profiles for all, own profile always
        included.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: people listed
  "/api/v1/people/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Get a person
      tags:
      - People
      security:
      - bearer_auth: []
      description: Get a person by ID. Respects privacy settings.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: person found
        '404':
          description: not found or private
  "/api/v1/roles":
    get:
      summary: List all roles
      tags:
      - Roles
      security:
      - bearer_auth: []
      description: List all platform roles.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: roles listed
  "/api/v1/roles/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Get a role
      tags:
      - Roles
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: role found
  "/api/v1/posts":
    get:
      summary: List posts
      tags:
      - Posts
      security:
      - bearer_auth: []
      description: List posts accessible to the current user, filtered by privacy
        and published status.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: posts listed
        '401':
          description: unauthorized
    post:
      summary: Create a post
      tags:
      - Posts
      security:
      - bearer_auth: []
      description: Create a new post. Requires authentication.
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer JWT token
        schema:
          type: string
      responses:
        '201':
          description: post created
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      example: posts
                    attributes:
                      type: object
                      properties:
                        title:
                          type: string
                        content:
                          type: string
                        privacy:
                          type: string
                          enum:
                          - public
                          - private
                      required:
                      - title
                  required:
                  - type
                  - attributes
              required:
              - data
        required: true
  "/api/v1/posts/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      description: Post UUID
      schema:
        type: string
    get:
      summary: Get a post
      tags:
      - Posts
      security:
      - bearer_auth: []
      description: Get a post by ID. Public published posts are accessible to all
        authenticated users.
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: post found
        '404':
          description: not found
    patch:
      summary: Update a post
      tags:
      - Posts
      security:
      - bearer_auth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: post updated
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              type: object
