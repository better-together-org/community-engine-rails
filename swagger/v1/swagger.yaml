components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from sign-in endpoint
  schemas:
    ValidationErrors:
      type: object
      description: Standard validation error response format
      properties:
        errors:
          type: array
          items:
            type: string
          description: Array of human-readable error messages
          example:
          - Email can't be blank
          - Password is too short
    User:
      type: object
      description: User account with authentication credentials
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier
        email:
          type: string
          format: email
          description: User email address
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
      required:
      - id
      - email
      - created_at
    JsonapiAttributes:
      type: object
      description: Resource attributes (varies by resource type)
      additionalProperties: true
    JsonapiResource:
      type: object
      description: JSON:API resource object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        attributes:
          "$ref": "#/components/schemas/JsonapiAttributes"
        relationships:
          type: object
          additionalProperties: true
        links:
          type: object
          additionalProperties: true
      required:
      - id
      - type
    JsonapiCollection:
      type: object
      description: JSON:API collection response
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/JsonapiResource"
        meta:
          type: object
          additionalProperties: true
        links:
          type: object
          additionalProperties: true
      required:
      - data
