
volumes:
  community-engine-bundler-gems:
    name: community-engine-rails_community-engine-bundler-gems
  community-engine-db-data:
    name: community-engine-rails_community-engine-db-data
  community-engine-redis:
    name: community-engine-rails_community-engine-redis
  community-engine-redis-rack-attack:
    name: community-engine-rails_community-engine-redis-rack-attack

x-env-info: &env-info
  env_file:
    # - './.env'
    - './.env.dev'

x-app-shared: &app-shared
  <<: *env-info
  image: better-together/community-engine-rails:dev
  volumes:
    - .:/community-engine
    # - ../pundit-resources:/pundit-resources
    - community-engine-bundler-gems:/usr/local/bundle/
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    DB_HOST: ${DB_HOST:-db}
    DB_PORT: ${DB_PORT:-5432}
    DB_USERNAME: ${DB_USERNAME:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-postgres}
    CE_WORKTREE_DB_SUFFIX: ${CE_WORKTREE_DB_SUFFIX:-}
    SEARCH_BACKEND: ${SEARCH_BACKEND:-pg_search}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    RACK_ATTACK_REDIS_URL: ${RACK_ATTACK_REDIS_URL:-redis://redis-rack-attack:6379}
    RACK_ATTACK_REDIS_POOL_SIZE: ${RACK_ATTACK_REDIS_POOL_SIZE:-5}
    RACK_ATTACK_REDIS_POOL_TIMEOUT: ${RACK_ATTACK_REDIS_POOL_TIMEOUT:-5}
  depends_on:
    - db
    - redis
    - redis-rack-attack

services:
  app: &app
    <<: *app-shared
    build: # "context" and "dockerfile" fields have to be under "build"
      context: .
      dockerfile: ./Dockerfile.dev
    command: bash -c "rm -f spec/dummy/tmp/pids/server.pid && cd ./spec/dummy && bundle exec rails s -p 3000 -b '0.0.0.0'"
    ports:
      - "3000:3000"
    tty: true
    stdin_open: true

  db:
    <<: *env-info
    container_name: community-engine-db
    image: imresamu/postgis:17-recent
    volumes:
      - community-engine-db-data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    env_file:
    - './.env.db.dev'

  sidekiq:
    <<: *app-shared
    command: bash -c "rm -f spec/dummy/tmp/pids/server.pid && cd ./spec/dummy && bundle exec sidekiq -C config/sidekiq.yml"
    depends_on:
      - app

  redis:
    image: 'redis:7.2-alpine'
    container_name: community-engine-redis
    command: redis-server
    ports:
      - "6380:6379"
    volumes:
      - community-engine-redis:/data

  redis-rack-attack:
    image: 'redis:7.2-alpine'
    container_name: community-engine-redis-rack-attack
    command: redis-server
    ports:
      - "6381:6379"
    volumes:
      - community-engine-redis-rack-attack:/data

  mail-server:
    image: mailhog/mailhog
    container_name: community-engine-smtp
    ports:
      - '1025:1025'
      - '8025:8025'

  stripe-cli:
    # Only started when the 'stripe' profile is active.
    # bin/dc activates this profile automatically when STRIPE_PRIVATE_KEY is set.
    image: stripe/stripe-cli:v1.40.9
    container_name: community-engine-stripe-cli
    command: >
      listen
      --api-key ${STRIPE_PRIVATE_KEY}
      --forward-to http://app:3000/pay/webhooks/stripe
      --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_PRIVATE_KEY:-}
    depends_on:
      - app
    profiles:
      - stripe
