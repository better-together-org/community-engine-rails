"better_together:metrics:link_checker_weekly":
  cron: "0 2 * * 1" # weekly on Mondays at 02:00 UTC
  class: "BetterTogether::Metrics::LinkCheckerReportSchedulerJob"
  queue: "metrics"
  description: "Generate Link Checker weekly report and email it to the app from-address (only sends if there are new broken links)"

"better_together:metrics:orphaned_link_cleanup_monthly":
  cron: "0 3 1 * *" # monthly on the 1st at 03:00 UTC
  class: "BetterTogether::Metrics::OrphanedRichTextLinkCleanupJob"
  queue: "maintenance"
  description: "Remove orphaned RichTextLink records where the associated record has been deleted"

"better_together:event_reminder_scan_hourly":
  cron: "0 * * * *" # hourly
  class: "BetterTogether::EventReminderScanJob"
  queue: "notifications"
  description: "Scan upcoming events and schedule per-event reminders"

"better_together:federated_sync_scan_hourly":
  cron: "15 * * * *" # hourly at :15 UTC
  class: "BetterTogether::FederatedSyncScanJob"
  queue: "platform_sync"
  description: "Scan active federated platform connections and enqueue content pull jobs"

"better_together:federated_linked_seed_sync_scan_hourly":
  cron: "20 * * * *" # hourly at :20 UTC
  class: "BetterTogether::FederatedLinkedSeedSyncScanJob"
  queue: "platform_sync"
  description: "Scan active linked private grants and enqueue recipient-scoped linked seed pulls"

"better_together:federation_access_token_purge_daily":
  cron: "0 1 * * *" # daily at 01:00 UTC
  class: "BetterTogether::FederationAccessTokenPurgeJob"
  queue: "maintenance"
  description: "Purge revoked and expired federation access tokens to prevent unbounded table growth"

"better_together:c3:expire_balance_locks":
  cron: "*/15 * * * *" # every 15 minutes
  class: "BetterTogether::C3::ExpireBalanceLocksJob"
  queue: "default"
  description: "Release C3 balance locks that have passed their 24-hour expiry — returns reserved Tree Seeds to the payer"
