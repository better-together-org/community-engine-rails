name: "Ruby on Rails CI"

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  rspec-core:
    name: "rspec-core (${{ matrix.ruby }}, ${{ matrix.rails_label }})"
    runs-on: ubuntu-latest
    environment: test
    continue-on-error: ${{ matrix.allowed_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: '3.4.4'
            rails: '7.2.2.2'
            rails_label: '7.2.x required'
            gemfile: gemfiles/rails_7_2.gemfile
            allowed_failure: false
          - ruby: '3.4.4'
            rails: '8.0.3'
            rails_label: '8.0.x required'
            gemfile: gemfiles/rails_8_0.gemfile
            allowed_failure: false

    env:
      RAILS_ENV: test
      DATABASE_URL: "postgis://rails:password@localhost:5432/rails_test"
      REDIS_URL: "redis://localhost:6379/0"
      ES_HOST:  "http://localhost"
      ELASTICSEARCH_URL: "http://localhost:9200"
      RAILS_VERSION: ${{ matrix.rails }}
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      WORKERS: 4

    services:
      postgres:
        image: postgis/postgis:latest
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
          # Increase max_connections for parallel test workers (4 workers + overhead)
          POSTGRES_INITDB_ARGS: "-c max_connections=50"
        options: >-
          --health-cmd "pg_isready -U rails"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: elasticsearch:7.17.23
        ports: ["9200:9200"]
        env:
          node.name: elasticsearch
          cluster.name: better-together-es
          discovery.seed_hosts: elasticsearch
          discovery.type: single-node
          bootstrap.memory_lock: "true"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ruby & gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: rails-${{ matrix.rails }}

      - name: Prepare search service
        run: |
          echo "Waiting for Elasticsearch to be healthy..."
          curl -s "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" || (echo "Elasticsearch not healthy" && exit 1)

      - name: Run core RSpec in parallel
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
        run: |
          rm -f spec/dummy/tmp/pids/server.pid
          bin/ci-rspec-core

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ruby-${{ matrix.ruby }}-rails-${{ matrix.rails }}
          path: |
            coverage/

      - name: Generate coverage badge
        if: ${{ github.ref == 'refs/heads/main' && success() }}
        continue-on-error: true
        run: |
          COVERAGE=$(jq -r '.result.covered_percent' coverage/.last_run.json)
          COLOR=$(node -e "cov=parseFloat(process.argv[1]);console.log(cov>=90?'green':cov>=75?'orange':'red')" $COVERAGE)
          npx badgen-cli --subject coverage --status ${COVERAGE}% --color $COLOR > coverage.svg

      - name: Commit badge
        if: ${{ github.ref == 'refs/heads/main' && success() }}
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge"
          file_pattern: coverage.svg

  rspec-browser:
    name: "rspec-browser (3.4.4, 8.0.x required)"
    runs-on: ubuntu-latest
    environment: test
    env:
      RAILS_ENV: test
      DATABASE_URL: "postgis://rails:password@localhost:5432/rails_test"
      REDIS_URL: "redis://localhost:6379/0"
      ES_HOST: "http://localhost"
      ELASTICSEARCH_URL: "http://localhost:9200"
      RAILS_VERSION: "8.0.3"
      BUNDLE_GEMFILE: gemfiles/rails_8_0.gemfile

    services:
      postgres:
        image: postgis/postgis:latest
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U rails"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: elasticsearch:7.17.23
        ports: ["9200:9200"]
        env:
          node.name: elasticsearch
          cluster.name: better-together-es
          discovery.seed_hosts: elasticsearch
          discovery.type: single-node
          bootstrap.memory_lock: "true"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ruby & gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: true
          cache-version: rails-8.0.3-browser

      - name: Prepare search service
        run: |
          echo "Waiting for Elasticsearch to be healthy..."
          curl -s "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s" || (echo "Elasticsearch not healthy" && exit 1)

      - name: Run browser RSpec
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
        run: |
          rm -f spec/dummy/tmp/pids/server.pid
          bin/ci-rspec-browser

  rspec-core-preview-8-1:
    name: "rspec-core (3.4.4, 8.1.x preview)"
    runs-on: ubuntu-latest
    environment: test
    continue-on-error: true
    env:
      RAILS_ENV: test
      DATABASE_URL: "postgis://rails:password@localhost:5432/rails_test"
      REDIS_URL: "redis://localhost:6379/0"
      ES_HOST: "http://localhost"
      ELASTICSEARCH_URL: "http://localhost:9200"
      RAILS_VERSION: "8.1.2"
      BUNDLE_GEMFILE: gemfiles/rails_8_1.gemfile
      WORKERS: 4

    services:
      postgres:
        image: postgis/postgis:latest
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: rails_test
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
          POSTGRES_INITDB_ARGS: "-c max_connections=50"
        options: >-
          --health-cmd "pg_isready -U rails"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      elasticsearch:
        image: elasticsearch:7.17.23
        ports: ["9200:9200"]
        env:
          node.name: elasticsearch
          cluster.name: better-together-es
          discovery.seed_hosts: elasticsearch
          discovery.type: single-node
          bootstrap.memory_lock: "true"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: false

      - name: Resolve Rails 8.1 preview bundle
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
        run: |
          bundle config set deployment false
          rm -f spec/dummy/tmp/pids/server.pid
          bin/ci-rails-preview

  # ── style & security jobs (unchanged) ───────────────────────────────────────
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with: { bundler-cache: true }
      - run: bundle exec rubocop --parallel

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with: { bundler-cache: true }
      - run: bundle binstubs bundler-audit --force
      - run: bundle exec bundler-audit --update
      - run: bundle exec brakeman -q -w2
